<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Aguarde...</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #111827;
            color: #fff;
            font-family: Arial, Helvetica, sans-serif;
        }

        .container {
            text-align: center;
        }

        .loader {
            width: 55px;
            height: 55px;
            border: 5px solid rgba(255,255,255,.2);
            border-top: 5px solid #25D366;
            border-radius: 50%;
            animation: spin .8s linear infinite;
            margin: 0 auto 20px;
        }

        h1 {
            font-size: 30px;
            margin-bottom: 8px;
        }

        p {
            color: #bdbdbd;
            font-size: 16px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>

    <script>
        setTimeout(function () {
            window.location.href = "https://chat.whatsapp.com/SEU_LINK_DO_GRUPO";
        }, 1000);
    </script>
</head>

<body>

<div class="container">
    <div class="loader"></div>

    <h1>Aguarde...</h1>

    <p>Estamos preparando seu acesso.</p>
</div>

</body>
</html>
